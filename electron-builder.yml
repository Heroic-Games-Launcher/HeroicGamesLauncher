appId: com.heroicgameslauncher.hgl
productName: Heroic
files:
  - build/**/*
  - node_modules/**/*
  - '!build/bin/*'
  - build/bin/legendary.LICENSE

asarUnpack:
  - build/icon.png
  - build/icon.icns
  - build/mac-icon.icns
  - build/win_icon.ico
  - build/icon-dark.png
  - build/icon-light.png
  - build/bin/**/*
  - '!build/bin/legendary.LICENSE'

protocols:
  - name: heroic
    schemes:
      - heroic

win:
  artifactName: ${productName}-${version}-Setup-${arch}.${ext}
  icon: build/win_icon.ico
  target:
    - nsis
  files:
    - build/bin/${arch}/win32/*
    - build/bin/x64/win32/nile.exe
    - build/bin/x64/win32/GalaxyCommunication.exe
    - build/bin/x64/win32/EpicGamesLauncher.exe

portable:
  artifactName: ${productName}-${version}-Portable-${arch}.${ext}

mac:
  artifactName: ${productName}-${version}-macOS-${arch}.${ext}
  category: public.app-category.games
  icon: build/mac-icon.icns
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    com.apple.security.cs.allow-jit: true
  fileAssociations:
    - ext: exe
      name: Windows Executable
      description: Windows Executable
      mimeType: application/x-ms-dos-executable
    - ext: msi
      name: Windows Installer
      description: Windows Installer Package
      mimeType: application/x-msi
    - ext: bat
      name: Windows Batch File
      description: Windows Batch Script
      mimeType: application/x-bat
  files:
    - build/bin/${arch}/darwin/*
    - build/bin/x64/win32/GalaxyCommunication.exe
    - build/bin/x64/win32/EpicGamesLauncher.exe

dmg:
  background: public/dmg.png
  window:
    width: 600
    height: 500
  contents:
    - x: 10
      y: 215
      type: file
    - x: 420
      y: 215
      type: link
      path: /Applications

linux:
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  category: Game
  icon: build/icon.icns
  fileAssociations:
    - ext: exe
      name: Windows Executable
      description: Windows Executable
      mimeType: application/x-ms-dos-executable
    - ext: msi
      name: Windows Installer
      description: Windows Installer Package
      mimeType: application/x-msi
    - ext: bat
      name: Windows Batch File
      description: Windows Batch Script
      mimeType: application/x-bat
  desktop:
    entry:
      Name: Heroic Games Launcher
      Comment[de]: Ein OSS-Spielelauncher fГјr GOG, Epic Games und Amazon Games
      Comment[pl]: OtwartoЕәrГіdЕӮowy launcher dla GOG, Epic Games i Amazon Games
      Comment[fr]: Un lanceur de jeux open source pour GOG, Epic Games et Amazon Games
      Comment[es]: Un lanzador de juegos de cГіdigo abierto para GOG, Epic Games
      Comment[it]: Un launcher open source per GOG, Epic Games e Amazon Games
      Comment[ru]: РһСӮРәСҖСӢСӮСӢР№ Р»Р°СғРҪСҮРөСҖ РҙР»СҸ GOG, Epic Games Рё Amazon
      Comment[zh_CN]: дёҖдёӘз”ЁдәҺGOGгҖҒEpic Gamesе’ҢAmazon Gamesзҡ„ејҖжәҗжёёжҲҸеҗҜеҠЁеҷЁ
      Comment[pt]: Um lanГ§ador de jogos de cГіdigo aberto para GOG, Epic Games e Amazon Games
      Comment[pt_BR]: Um lanГ§ador de jogos de cГіdigo aberto para GOG, Epic Games e Amazon Games
      Comment[ja]: GOGгҖҒEpic GamesгҖҒAmazon GamesгҒ®гҒҹгӮҒгҒ®гӮӘгғјгғ—гғігӮҪгғјгӮ№гғ©гғігғҒгғЈгғј
      Comment: An Open Source Launcher for GOG, Epic Games and Amazon Games
  files:
    - build/bin/${arch}/linux/*
    - build/bin/x64/win32/GalaxyCommunication.exe
    - build/bin/x64/win32/EpicGamesLauncher.exe

rpm:
  fpm: ['--rpm-rpmbuild-define', '_build_id_links none']

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: true
