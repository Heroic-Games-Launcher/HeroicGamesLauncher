# Mirrors GMG's discounted products (impact.com partner API) to static JSONs
# on the `gmg-feed` branch, consumed by src/backend/discounts/gmg.ts.
# Requires repository secrets: IMPACT_ACCOUNT_SID, IMPACT_AUTH_TOKEN.
name: Update GMG discounts feed

on:
  schedule:
    - cron: '43 6 * * *'
  workflow_dispatch:

concurrency:
  group: gmg-feed

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Fetch and normalize the GMG catalog
        env:
          IMPACT_ACCOUNT_SID: ${{ secrets.IMPACT_ACCOUNT_SID }}
          IMPACT_AUTH_TOKEN: ${{ secrets.IMPACT_AUTH_TOKEN }}
          IMPACT_CATALOG_ID: ${{ vars.IMPACT_CATALOG_ID }}
        run: node .github/scripts/mirror-gmg-feed.mjs "$RUNNER_TEMP/gmg-feed"

      - name: Publish to the gmg-feed branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Single force-pushed commit so the feed history never grows the repo
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          cp "$RUNNER_TEMP"/gmg-feed/gmg-discounts-*.json "$publish_dir/"
          cd "$publish_dir"
          git init --quiet --initial-branch=gmg-feed
          git add 'gmg-discounts-*.json'
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit --quiet -m "Update GMG discounts feed"
          git push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gmg-feed
